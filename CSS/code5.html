<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">

    <title>Document</title>
    <style>
        * {
            margin: 0;
            padding: 0;
        }

        body {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background-color: gray;
        }

        .mainCard {
            display: flex;
            gap: 20px;
            flex-wrap: wrap;
            justify-content: center;
        }

        .card {
            width: 300px;
            /* border: 1px solid black; */
            border-radius: 20px;
            background-color: rgb(247, 247, 247);
            padding: 20px;
            font-family: sans-serif;


        }

        .icons {
            display: flex;
            justify-content: space-between;
        }


        .icons img {
            width: 50px;
            border-radius: 50%;
        }

        .btn {
            border-radius: 15px;
            border: none;
            padding: 10px 20px;
            font-size: 18px;
            font-weight: bold;
            background-color: rgb(217, 211, 211);
        }

        .text {
            margin: 30px 0
        }

        .textFirst {
            margin: 15px 0;

            display: flex;
            gap: 30px;

        }

        .textFirst p {
            color: gray;
        }

        .textSecond {
            margin: 15px 0;

        }

        .btnGroup {
            display: flex;
            gap: 20px;
        }

        .footer {
            display: flex;
            justify-content: space-between;
            margin-top: 20px;
        }

        .footerFirst p {
            color: gray;
            font-size: 18px;
        }

        .footerSecond button {
            background-color: black;
            color: white;
        }
    </style>
</head>

            </div>
            <div class="text">
