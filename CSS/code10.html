<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
        integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
        crossorigin="anonymous" referrerpolicy="no-referrer" />
    <style>
        * {
            margin: 0;
            padding: 0;
        }

        nav {
            background-color: black;
            display: flex;
            justify-content: space-around;
            color: white;
            padding: 20px;


        }

        ul {
            display: none;
            gap: 20px;
            list-style-type: none;
        }

        .heroSection {
            display: flex;
            flex-direction: column-reverse;
            align-items: center;
        }

        .heroSection img {
            width: 300px;
            height: 300px;
            border-radius: 50%;
            border: 1px dotted red;
        }

        .text {
            text-align: center;
        }


        @media only screen and (min-width: 700px) {
            ul {
                display: flex;
            }

            .icon {
                display: none;
            }

            .heroSection {
                flex-direction: row;
            }

            .heroSection img {
                width: 400px;
                height: 400px;
            }
        }
    </style>
</head>

<body>
    <nav>
        <div class="logo">LOGO</div>
        <ul>
            <li>Home</li>
            <li>About</li>
            <li>Contact</li>
            <li>Services</li>
        </ul>
        <div class="icon">
            <i class="fa-solid fa-bars-staggered"></i>
        </div>
    </nav>
    <!-- heroSection -->
    <div class="heroSection">
        <div class="text">
            <h1>Lorem ipsum dolor sit amet.</h1>
            <p>Lorem ipsum dolor sit, amet consectetur adipisicing elit. Quo, earum facere. Aspernatur qui dolore cumque
                repellat libero eligendi culpa, similique voluptatibus accusantium alias iure minima. Odio itaque est
                esse velit.</p>
            <button>Click me</button>
        </div>
        <img src="/Task/Table.png" alt="">
    </div>
</body>

</html>
