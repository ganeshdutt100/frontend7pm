<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>

<body>
    <form>
        <fieldset>
            <legend>Search</legend>
            <input type="search"> <br> <br>
            <input type="text"> <br> <br>
        </fieldset>
        <fieldset>
            <legend>Basic Info</legend>
            <label>Enter your first name : </label>
            <input type="text"> <br> <br>
            <label>Enter your last name : </label>
            <input type="text"> <br> <br>
            <label>Enter your email : </label>
            <input type="email"> <br> <br>
            <label>Enter your phone : </label>
            <input type="number" max="12" min="5"> <br> <br>
            <label>Enter your password : </label>
            <input type="password"> <br> <br>
            <label>color : </label>
            <input type="color"> <br> <br>
            <label>File : </label>
            <input type="file"> <br> <br>
            <label>DOB : </label>
            <input type="date"> <br> <br>
            <label>time : </label>
            <input type="time"> <br> <br>
        </fieldset>

        <fieldset>
            <legend>Value</legend>
            <label>Gender : </label>
            <input type="radio" name="gender"> Male
            <input type="radio" name="gender"> Female
            <input type="radio" name="gender"> Others <br> <br>

            <label> Skills:</label>
            <input type="checkbox">HTML
            <input type="checkbox">CSS
            <input type="checkbox">Tailwind
            <input type="checkbox">Js
            <input type="checkbox">React
            <input type="checkbox">Next.js
            <input type="checkbox">Express.js
            <input type="checkbox">Node.js
            <input type="checkbox">MongoDB
            <input type="checkbox">Java
            <input type="checkbox">Python
            <input type="checkbox">PHP
            <input type="checkbox">C++
            <input type="checkbox">C <br> <br>
            <input type="range">

        </fieldset>


        <fieldset>
            <legend>Buttons</legend>
            <input type="submit">
            <input type="reset">
        </fieldset>
        <!-- <button type="submit">Submit</button> -->
    </form>
</body>

</html>
